# Dentra admin panel
#
# Install:
#   sudo cp deploy/nginx/admin.conf /etc/nginx/sites-available/dentra-admin
#   sudo ln -sf /etc/nginx/sites-available/dentra-admin /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d admin.dentramm.com
#
# After certbot, keep try_files as below in the 443 server block.
# Build output: /var/www/dentra/admin/dist

server {
    listen 80;
    listen [::]:80;
    server_name admin.dentramm.com;

    root /var/www/dentra/admin/dist;
    index index.html;

    # Never cache the SPA shell (stale index → wrong hashed JS → login 404)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/dentra-admin-access.log;
    error_log /var/log/nginx/dentra-admin-error.log;
}
